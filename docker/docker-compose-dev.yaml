services:
  mastra:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: personal-finance-mastra
    restart: unless-stopped
    # command: ["mastra", "dev"]
    environment:
      LOG_LEVEL: "info"
      PORT: ${PORT:-4111}
      MASTRA_HOST: ${MASTRA_HOST:-0.0.0.0}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgresql}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      MASTRA_OBSERVABILITY_ENABLED: ${MASTRA_OBSERVABILITY_ENABLED:-true}
      POSTGRES_DB: ${POSTGRES_DB:-personal_finance_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      AIRTABLE_PAT: ${AIRTABLE_PAT:-}
      AIRTABLE_MCP_URL: ${AIRTABLE_MCP_URL:-https://mcp.airtable.com/mcp}
      MASTRA_CLOUD_ACCESS_TOKEN: ${MASTRA_CLOUD_ACCESS_TOKEN:-}
    ports:
      - "4111:4111"
    depends_on:
      postgresql:
        condition: service_healthy
      # qdrant:
      #   condition: service_healthy
  postgresql:
    image: postgres:17-alpine
    container_name: personal-finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_finance_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personal_finance_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
